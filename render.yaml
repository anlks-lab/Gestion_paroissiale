# Render Blueprint — déploie l'API Gestion Paroissiale via le Dockerfile du repo.
# Doc : https://render.com/docs/blueprint-spec
#
# `sync: false` => Render demande la valeur lors de la création du Blueprint puis
# la laisse gérée manuellement dans le Dashboard (secrets qui ne doivent pas être
# commit, ex. clés API, mots de passe).

databases:
  - name: gestion-paroissiale-db

services:
  - type: web
    name: gestion-paroissiale-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      # --- Django core ---
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PUBLIC_BASE_URL
        value: https://gestiparr.onrender.com/api
      - key: FRONTEND_URL
        sync: false
        sync: false
      - key: WEB_CONCURRENCY
        value: "4"

    
      # --- Redis (tokens JWT, cache, verrouillage de compte) ---
      # Render n'a pas d'offre Redis/Key Value gratuite : pointer vers une instance
      # externe (ex. Upstash) ou laisser vide — l'app bascule alors sur LocMemCache +
      # sessions en base (dégradé mais fonctionnel, voir fixs.md).
      - key: REDIS_URL
        sync: false

      # --- Emails (Resend en primaire, cf. CLAUDE.md — SMTP est bloqué sur Render) ---
      - key: EMAIL_BACKEND
        value: anymail.backends.resend.EmailBackend
      - key: EMAIL_FALLBACK_BACKEND
        value: ""
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: TEST_RECIPIENT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
