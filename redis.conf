# redis.conf
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 300

# Persistance
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Sécurité (décommentez en production)
# requirepass votre_mot_de_passe_complexe

# Mémoire
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logs
loglevel notice
logfile /var/log/redis/redis-server.log

# Performances
maxclients 10000
tcp-backlog 511