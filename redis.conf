bind 0.0.0.0
port 6379

timeout 0
tcp-keepalive 300

######################
# Persistence
######################

dir /data
dbfilename dump.rdb

save 900 1
save 300 10
save 60 10000

appendonly yes

######################
# Memory
######################

maxmemory 256mb
maxmemory-policy allkeys-lru

######################
# Logging
######################

loglevel notice
logfile ""

######################
# Network
######################

maxclients 10000
tcp-backlog 511